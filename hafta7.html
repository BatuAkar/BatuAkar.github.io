<!DOCTYPE html>
<html lang="tr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafta 7 - Bootstrap & JS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">← Ana Sayfaya Dön</a> 
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary btn-sm" id="themeToggle">Temayı Değiştir</button>
            </div>
        </div>
    </nav>

    <header class="bg-body-tertiary py-5 border-bottom text-center">
        <div class="container">
            <h1 class="display-5 fw-bold">Etkinlik Kayıt</h1>
            <p class="lead">Bootstrap ve JS Etkileşimi</p>
        </div>
    </header>

    <main class="container py-5">
        <section id="kayitFormu" class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card p-4 shadow">
                    <form id="etkinlikFormu">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Ad Soyad</label>
                                <input type="text" id="adSoyad" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">E-posta</label>
                                <input type="email" id="eposta" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Bölüm</label>
                                <input type="text" id="bolum" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Sınıf</label>
                                <select id="sinif" class="form-select" required>
                                    <option value="">Seçiniz...</option>
                                    <option value="1">1. Sınıf</option>
                                    <option value="2">2. Sınıf</option>
                                    <option value="3">3. Sınıf</option>
                                    <option value="4">4. Sınıf</option>
                                </select>
                            </div>
                            <div class="col-12 text-end">
                                <button type="submit" class="btn btn-primary">Başvuru Özeti Oluştur</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <div id="sonucAlani" class="mt-4 row justify-content-center"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/hafta7.js"></script>
</body>
</html>
